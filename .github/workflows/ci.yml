name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage (Domain)
        run: >
          dotnet test tests/Domain.Tests/Domain.Tests.csproj
          --no-build --configuration Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=../../coverage/domain/
          /p:Threshold=80
          /p:ThresholdType=line,branch,method

      - name: Test with coverage (Integration)
        run: >
          dotnet test tests/Integration.Tests/Integration.Tests.csproj
          --no-build --configuration Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=../../coverage/integration/
          /p:Threshold=80
          /p:ThresholdType=line,branch,method

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/domain/coverage.cobertura.xml,coverage/integration/coverage.cobertura.xml
          fail_ci_if_error: false
